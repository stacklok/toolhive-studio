#
# Grype configuration for toolhive-react.
# - node_modules/: lock file is the source of truth; scanning installed packages is redundant.
# - dist/:         build artifacts, not source packages.

only-fixed: true

exclude:
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/bin/**'
  - '**/out/**'
  - '**/.webpack/**'
  - '**/coverage/**'
  - '**/playwright-report/**'
  - '**/test-results/**'
  - '**/test-videos/**'
  - '**/.vite/**'
  - '**/.cache/**'

name: Bug Fix (On Label)

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  bug-fix:
    name: Bug Fix Agent
    if: >-
      github.event.label.name == 'agent-fix'
      && contains(github.event.issue.labels.*.name, 'Bug')
    uses: ./.github/workflows/_bug-fix-agent.yml
    with:
      issue-number: ${{ github.event.issue.number }}
    secrets: inherit

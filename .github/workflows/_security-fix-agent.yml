name: Security Fix Agent

on:
  workflow_call:

concurrency:
  group: security-fix-agent
  cancel-in-progress: true

jobs:
  remediate:
    name: Auto-Remediate Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.TOOLHIVE_STUDIO_CI_APP_ID }}
          private-key: ${{ secrets.TOOLHIVE_STUDIO_CI_APP_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Compute dependency fingerprint
        id: fingerprint
        run: |
          HASH=$(sha256sum package.json pnpm-lock.yaml .grype.yaml 2>/dev/null | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Check for existing remediation PR
        id: existing
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="security/auto-remediate-vulns"
          BASE="${{ github.event.repository.default_branch }}"
          PR_BODY=$(gh pr list --head "$BRANCH" --base "$BASE" --state open --json body --jq '.[0].body // empty')

          if [ -n "$PR_BODY" ] && echo "$PR_BODY" | grep -q "${{ steps.fingerprint.outputs.hash }}"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::Open PR already exists for this dependency fingerprint — skipping agent run"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup
        if: steps.existing.outputs.skip != 'true'
        uses: ./.github/actions/setup

      - name: Install Grype
        if: steps.existing.outputs.skip != 'true'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype version

      - name: Install Cursor CLI
        if: steps.existing.outputs.skip != 'true'
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: 'Phase 1: Analyze and Plan (GPT-5.4 High Fast)'
        if: steps.existing.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          agent -p --model gpt-5.4-high-fast --mode=plan --trust \
            "Read .cursor/skills/security-vuln-remediation/SKILL.md and follow it.
             Run grype and pnpm audit to identify all current vulnerabilities.
             For each vulnerability, run pnpm why on the affected package.
             Analyze the impact of each vulnerability (CVSS, attack vector, production vs dev).
             Write a detailed remediation-plan.md with your full analysis and proposed fixes.
             Do NOT modify any project files — only create remediation-plan.md."

      - name: 'Phase 2: Implement Fixes (Claude 4.6 Sonnet)'
        if: steps.existing.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          agent -p --force --model claude-4.6-sonnet-medium-thinking --trust \
            "Read .cursor/skills/security-vuln-remediation/SKILL.md and remediation-plan.md.
             Implement every fix described in the remediation plan:
             - Upgrade packages where a patch/minor fix is available.
             - Add pnpm overrides in package.json where an upgrade is not feasible.
             - Add grype ignores in .grype.yaml only for dev-only packages with no fix.
             Run pnpm install after changes to regenerate the lockfile.
             Re-run grype . --config .grype.yaml to verify each fix.
             Update remediation-plan.md with verification results.
             Write a conventional-commit-style PR title to remediation-title.txt (see skill for format).
             Do NOT run git, gh, or modify .env files."

      - name: Check for changes
        if: steps.existing.outputs.skip != 'true'
        id: changes
        run: |
          if git diff --quiet -- package.json pnpm-lock.yaml .grype.yaml; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and commit
        if: steps.existing.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        id: push
        run: |
          BRANCH="security/auto-remediate-vulns"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          TITLE=$(cat remediation-title.txt 2>/dev/null || echo "fix(security): auto-remediate vulnerabilities")
          git add package.json pnpm-lock.yaml .grype.yaml
          git diff --cached --quiet && exit 0
          git commit -m "$TITLE"
          git push --force -u origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create or update Pull Request
        if: steps.existing.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="${{ steps.push.outputs.branch }}"
          BASE="${{ github.event.repository.default_branch }}"
          TITLE=$(cat remediation-title.txt 2>/dev/null || echo "fix(security): auto-remediate vulnerabilities")
          BODY=$(cat remediation-plan.md 2>/dev/null || echo "Automated security vulnerability remediation.")
          FOOTER="<!-- fingerprint:${{ steps.fingerprint.outputs.hash }} -->"
          BODY="${BODY}

          ${FOOTER}"

          EXISTING_PR=$(gh pr list --head "$BRANCH" --base "$BASE" --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --title "$TITLE" --body "$BODY"
          else
            gh label create security --description "Security vulnerability remediation" --color D93F0B 2>/dev/null || true
            gh pr create \
              --title "$TITLE" \
              --body "$BODY" \
              --base "$BASE" \
              --head "$BRANCH" \
              --label "security"
          fi

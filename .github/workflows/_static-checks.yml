name: Static Checks
on:
  workflow_call:
permissions:
  contents: read
jobs:
  prettier:
    name: Prettier Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run prettier
        run: pnpm run prettier

  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run linter
        run: pnpm run lint

  knip:
    name: knip Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run knip
        run: pnpm run knip

  tsc:
    name: TS Types Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run Tsc
        run: pnpm run type-check

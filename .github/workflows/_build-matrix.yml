name: Build Matrix
on:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build App on ${{ matrix.os }}${{ matrix.arch && format(' ({0})', matrix.arch) || '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-15-intel
            arch: x64
          - os: macos-latest
            arch: arm64
    env:
      NODE_OPTIONS: '--max_old_space_size=4096'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Setup macOS code signing
        uses: ./.github/actions/setup-macos-codesign
        if: runner.os == 'macOS'
        with:
          apple-certificate: ${{ secrets.APPLE_CERTIFICATE }}
          apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          apple-api-key: ${{ secrets.APPLE_API_KEY }}

          apple-issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
          apple-key-id: ${{ secrets.APPLE_KEY_ID }}

      - name: Setup Flatpak (Linux only)
        uses: ./.github/actions/setup-flatpak
        if: runner.os == 'Linux'

      - name: Configure AWS Credentials
        if: runner.os == 'Windows' && vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # TODO: remove after first successful release — one-time backfill of nupkg to latest/ path
      - name: Backfill Windows update artifacts to stable path
        if: runner.os == 'Windows' && vars.AWS_ROLE_ARN != ''
        shell: bash
        run: |
          CHANNEL="stable"
          ARCH=${{ matrix.arch }}
          BUCKET="toolhive-studio-releases"
          DST="s3://${BUCKET}/${CHANNEL}/latest/win32/${ARCH}"

          if aws s3 ls "${DST}/" | grep -q '\.nupkg$'; then
            echo "nupkg already exists at ${DST} — skipping backfill"
          else
            echo "No nupkg at ${DST}, looking for latest versioned release..."
            LATEST_VERSION=$(aws s3 ls "s3://${BUCKET}/${CHANNEL}/" --recursive \
              | grep 'win32/x64/.*\.nupkg$' \
              | sort | tail -1 | awk '{print $NF}')

            if [ -n "$LATEST_VERSION" ]; then
              echo "Backfilling from s3://${BUCKET}/${LATEST_VERSION}"
              aws s3 cp "s3://${BUCKET}/${LATEST_VERSION}" "${DST}/$(basename ${LATEST_VERSION})"

              SRC_DIR=$(dirname "s3://${BUCKET}/${LATEST_VERSION}")
              aws s3 cp "${SRC_DIR}/RELEASES" "${DST}/RELEASES" || true
            else
              echo "::warning::No nupkg found in any versioned path — skipping backfill"
            fi
          fi

      - name: Build App
        run: pnpm run make
        env:
          npm_config_target_platform: ${{ runner.os == 'Linux' && 'linux' || (runner.os == 'macOS' && 'darwin' || 'win32') }}
          # Apple API Key method for notarization (set by composite action)
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_ISSUER_ID: ${{ env.APPLE_ISSUER_ID }}
          APPLE_KEY_ID: ${{ env.APPLE_KEY_ID }}

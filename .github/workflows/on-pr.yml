name: On PR
on:
  pull_request:
permissions:
  contents: read
jobs:
  security:
    name: Security Checks
    uses: ./.github/workflows/_security-checks.yml

  static-checks:
    name: Static Checks
    uses: ./.github/workflows/_static-checks.yml
    secrets: inherit

  build-matrix:
    name: Build Matrix
    uses: ./.github/workflows/_build-matrix.yml
    secrets: inherit

  unit-tests:
    name: Unit Tests
    uses: ./.github/workflows/_unit-tests.yml
    secrets: inherit

  e2e-tests:
    name: End-to-end tests
    uses: ./.github/workflows/_e2e.yml
    secrets: inherit

  security-fix:
    name: Security Fix Agent
    needs: security
    if: ${{ failure() }}
    uses: ./.github/workflows/_security-fix-agent.yml
    secrets: inherit

name: Bug Fix Agent (Experimental — Visual)

# EXPERIMENT: tier-2 bug fixing with a live ToolHive Studio running inside the
# project's devcontainer. The agent can drive the running app via `docker exec`
# (xdotool, screenshots) when a unit-test reproduction is impractical. PR flow
# is identical to the production agent — base = main, head = fix/auto-<issue#>.
#
# Trigger:
#   gh workflow run _bug-fix-agent-experimental.yml \
#     -r experiment/bug-fix-visual -f issue-number=663

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: 'Issue number to fix'
        required: true
        type: number

concurrency:
  group: bug-fix-experimental-${{ inputs.issue-number }}
  cancel-in-progress: true

jobs:
  fix:
    name: Bug Fix (Visual POC)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      # Required by .devcontainer/devcontainer.json runArgs port mapping.
      # In CI we don't need the host-side noVNC tunnel; just pick a free port
      # so the mapping resolves to something valid.
      NOVNC_HOST_PORT: 6080

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.TOOLHIVE_STUDIO_CI_APP_ID }}
          private-key: ${{ secrets.TOOLHIVE_STUDIO_CI_APP_KEY }}

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: refs/heads/main
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch issue body
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue view ${{ inputs.issue-number }} --json title,body,labels \
            --template '# {{.title}}{{"\n\n"}}{{.body}}' > issue-body.md

      - name: Build & start devcontainer (cached via gha)
        uses: devcontainers/ci@v0.3
        with:
          imageName: toolhive-studio-devcontainer
          cacheFrom: type=gha
          push: never
          runCmd: |
            echo "Devcontainer up. Workspace: $(pwd)"
            ls -la
            node --version
            pnpm --version

      - name: Find container ID
        id: container
        run: |
          CONTAINER=$(docker ps \
            --filter "label=devcontainer.local_folder=$GITHUB_WORKSPACE" \
            --format '{{.ID}}' | head -1)
          if [ -z "$CONTAINER" ]; then
            echo "::error::No devcontainer found for $GITHUB_WORKSPACE"
            docker ps
            exit 1
          fi
          echo "id=$CONTAINER" >> $GITHUB_OUTPUT
          echo "::notice::Devcontainer ID: $CONTAINER"

      - name: Launch app inside devcontainer (background)
        run: |
          # Detached exec; the entrypoint backgrounds Xvfb/fluxbox/x11vnc/dbus/keyring,
          # then runs `pnpm start` under a PTY wrapper (script -qfc) that survives
          # the lack of a TTY in CI.
          docker exec -d -u node ${{ steps.container.outputs.id }} \
            bash -c 'cd /workspaces/toolhive-studio && \
              nohup bash scripts/devcontainer-entrypoint.sh \
                > /tmp/entrypoint.log 2>&1 &'

      - name: Wait for app readiness
        timeout-minutes: 8
        run: |
          CONTAINER=${{ steps.container.outputs.id }}
          for i in $(seq 1 90); do
            # Three signals: noVNC HTTP up, electron running, thv serve running.
            # Use [t]hv / [e]lectron bracket trick so pgrep doesn't self-match
            # the shell's argv (see devcontainer-dev skill, "pgrep self-match").
            if docker exec "$CONTAINER" bash -c '
                curl -fsS http://localhost:6080/ >/dev/null 2>&1 \
                && pgrep -f "[e]lectron/dist/electron" >/dev/null \
                && pgrep -f "[t]hv serve" >/dev/null
              '; then
              echo "::notice::App ready (attempt $i)"
              exit 0
            fi
            echo "[$i/90] not ready yet..."
            sleep 5
          done
          echo "::error::App did not become ready"
          echo '--- entrypoint.log (tail) ---'
          docker exec "$CONTAINER" tail -200 /tmp/entrypoint.log || true
          echo '--- xvfb.log (tail) ---'
          docker exec "$CONTAINER" tail -50 /tmp/xvfb.log || true
          exit 1

      - name: 'Phase 1 — Analyze & Repro (Opus, with live app access)'
        id: phase1
        continue-on-error: true
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434 # v1
        env:
          DEVCONTAINER_ID: ${{ steps.container.outputs.id }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read .claude/skills/bug-fix-tdd/SKILL.md and follow it.
            Read issue-body.md for the bug report.

            EXPERIMENTAL — live app available:
            A running ToolHive Studio is available inside a devcontainer.
            The container ID is in the environment variable DEVCONTAINER_ID.
            DISPLAY=:99 inside the container. The workspace is bind-mounted at
            /workspaces/toolhive-studio, so source edits on the runner propagate
            to the container via Vite HMR (renderer changes only — main-process
            edits would need an Electron restart).

            Useful commands:
              docker exec "$DEVCONTAINER_ID" bash -c 'DISPLAY=:99 xwininfo -root -tree'
              docker exec "$DEVCONTAINER_ID" bash -c 'DISPLAY=:99 xdotool search --name ToolHive'
              docker exec "$DEVCONTAINER_ID" bash -c 'DISPLAY=:99 xdotool mousemove X Y click 1'
              docker exec "$DEVCONTAINER_ID" bash -c 'DISPLAY=:99 xdotool key Tab'
              docker exec "$DEVCONTAINER_ID" bash -c 'DISPLAY=:99 import -window root /tmp/shot.png'
              docker cp "$DEVCONTAINER_ID":/tmp/shot.png /tmp/shot.png
              # then Read /tmp/shot.png to view it

            WHEN TO USE THE LIVE APP:
            Default to a unit-test reproduction. Reach for the live app only when
            the bug genuinely requires it: cross-route side effects, async backend
            lifecycle (`thv` workload events), real IPC. Pixel-driving is fragile
            and slow — even when you use the live app for repro, your eventual
            FAILING TEST should be a unit test that captures the underlying
            invariant (e.g. mock the IPC event and assert the router behavior).
            The unit test is what gates Phase 2.

            Your task (Phase 1):
            1. Analyze the bug report.
            2. Reproduce the bug (in the live app and/or as a failing unit test).
            3. Write a unit test that captures the bug — must FAIL.
            4. Run: pnpm run test:nonInteractive -- <test-file-path>
            5. Verify the failure is for the RIGHT reason.
            6. Write bug-analysis.md per the skill format.
               Include a "Visual repro:" section if you used the live app.

            Do NOT modify source files in this phase. Tests + bug-analysis.md only.
          claude_args: >-
            --model opus
            --max-turns 75
            --allowedTools "Read,Grep,Glob,Edit,Write,Bash(pnpm run test:nonInteractive *),Bash(cat *),Bash(ls *),Bash(docker exec *),Bash(docker cp *),Bash(docker ps *)"

      - name: 'Hard gate — Verify test fails'
        id: gate
        if: steps.phase1.outcome == 'success'
        run: |
          if [ ! -f bug-analysis.md ]; then
            echo "::warning::bug-analysis.md not found"
            echo "test_fails=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          TEST_FILE=$(grep "^Test file:" bug-analysis.md | sed 's/^Test file: //' || true)
          if [ -z "$TEST_FILE" ]; then
            echo "::warning::No 'Test file:' line in bug-analysis.md"
            echo "test_fails=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "test_file=$TEST_FILE" >> $GITHUB_OUTPUT
          if pnpm run test:nonInteractive -- "$TEST_FILE" 2>&1; then
            echo "::warning::Test passed (bug not reproduced)"
            echo "test_fails=false" >> $GITHUB_OUTPUT
          else
            echo "::notice::Test fails as expected"
            echo "test_fails=true" >> $GITHUB_OUTPUT
          fi

      - name: 'Phase 2 — TDD Fix (Sonnet)'
        id: phase2
        if: steps.gate.outputs.test_fails == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434 # v1
        env:
          DEVCONTAINER_ID: ${{ steps.container.outputs.id }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read .claude/skills/bug-fix-tdd/SKILL.md and bug-analysis.md.

            The live app from Phase 1 is still running in the devcontainer
            (ID: $DEVCONTAINER_ID). You may use it for sanity-checking your fix,
            but the gate is still: pnpm run test:nonInteractive passes.

            Your task (Phase 2 — Fix):
            1. Read the failing test and understand what it expects.
            2. Apply the MINIMUM fix to make the test pass.
            3. Run: pnpm run test:nonInteractive -- ${{ steps.gate.outputs.test_file }}
            4. Run the full suite: pnpm run test:nonInteractive
            5. Run pnpm run lint and pnpm run type-check.
            6. If any check fails, adjust (max 5 attempts).
            7. Write pr-body.md (include 'Fixes #${{ inputs.issue-number }}')
               and fix-title.txt.

            Do NOT run git, gh, or modify .env files.
            Do NOT over-engineer.
          claude_args: >-
            --model sonnet
            --max-turns 150
            --allowedTools "Read,Grep,Glob,Edit,Write,Bash(pnpm run test:nonInteractive *),Bash(pnpm run lint),Bash(pnpm run type-check),Bash(cat *),Bash(ls *),Bash(docker exec *),Bash(docker cp *)"

      - name: 'Hard gate — Verify all checks pass'
        id: verify
        if: steps.phase2.outcome == 'success'
        run: |
          if pnpm run test:nonInteractive && pnpm run lint && pnpm run type-check; then
            echo "::notice::All checks pass"
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "::warning::Verification failed"
            echo "result=failure" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and commit
        if: steps.verify.outputs.result == 'success'
        id: push
        run: |
          ISSUE_NUM="${{ inputs.issue-number }}"
          BRANCH="fix/auto-${ISSUE_NUM}-experimental"
          TITLE=$(cat fix-title.txt 2>/dev/null || echo "fix: auto-fix for #${ISSUE_NUM}")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add -A -- '*.ts' '*.tsx' '**/*.ts' '**/*.tsx'

          if git diff --cached --quiet; then
            echo "::warning::No source changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "$TITLE"
            git push -u origin "$BRANCH"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.verify.outputs.result == 'success' && steps.push.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="${{ steps.push.outputs.branch }}"
          TITLE=$(cat fix-title.txt 2>/dev/null || echo "fix: auto-fix for #${{ inputs.issue-number }}")

          if [ ! -f pr-body.md ]; then
            echo "Automated fix for #${{ inputs.issue-number }} (experimental visual flow)." > pr-body.md
          fi

          # Append a marker so reviewers can tell this came from the experiment
          printf '\n\n---\n_Generated by the experimental visual bug-fix flow (`%s`)._\n' \
            "${{ github.workflow }}" >> pr-body.md

          gh label create auto-fix-experimental \
            --description "Experimental visual bug-fix agent" \
            --color FBCA04 2>/dev/null || true

          gh pr create \
            --title "$TITLE" \
            --body-file pr-body.md \
            --base main \
            --head "$BRANCH" \
            --label "auto-fix-experimental"

      - name: Comment on issue (failure path)
        if: always() && steps.verify.outputs.result != 'success' && steps.phase1.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f bug-analysis.md ]; then
            ANALYSIS=$(cat bug-analysis.md)
          else
            ANALYSIS="The experimental agent could not analyze this bug."
          fi
          printf '## Bug Fix Agent (Experimental — Visual) — Analysis\n\n%s\n\n---\n_This is from the experimental visual flow. The production fixer may behave differently._\n' \
            "$ANALYSIS" > /tmp/comment-body.md
          gh issue comment "${{ inputs.issue-number }}" --body-file /tmp/comment-body.md

      - name: Diagnostics on failure
        if: failure() || steps.verify.outputs.result != 'success'
        run: |
          CONTAINER=${{ steps.container.outputs.id }}
          if [ -n "$CONTAINER" ]; then
            echo '=== Container processes ==='
            docker exec "$CONTAINER" ps auxf || true
            echo '=== entrypoint.log ==='
            docker exec "$CONTAINER" tail -300 /tmp/entrypoint.log || true
            echo '=== xvfb.log ==='
            docker exec "$CONTAINER" tail -100 /tmp/xvfb.log || true
            echo '=== fluxbox.log ==='
            docker exec "$CONTAINER" tail -100 /tmp/fluxbox.log || true
            echo '=== keyring.log ==='
            docker exec "$CONTAINER" tail -50 /tmp/keyring.log || true
          fi

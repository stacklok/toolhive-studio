name: Release
on:
  release:
    types: [published]

permissions:
  contents: write # Required for GitHub publisher to upload release assets
  checks: write # Required for unit tests workflow
  pull-requests: write # Required for unit tests workflow
  id-token: write # Required for AWS OIDC authentication

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$ ]]; then
            echo "::error::Tag '$TAG' is not valid semver (e.g. v1.2.3, v1.2.3-rc.1)"
            exit 1
          fi
          echo "Valid tag: $TAG"

  validate-prerelease:
    name: Validate Prerelease Tag
    runs-on: ubuntu-latest
    steps:
      - name: Validate prerelease tag
        if: ${{ github.event.release.prerelease == true }}
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)(\.[0-9]+)?$ ]]; then
            echo "::error::Invalid prerelease tag '$TAG'. Allowed identifiers: alpha, beta, rc"
            exit 1
          fi
          echo "Valid prerelease tag: $TAG"

  security:
    name: Security Checks
    needs: [validate-tag, validate-prerelease]
    uses: ./.github/workflows/_security-checks.yml

  static-checks:
    name: Static Checks
    needs: [validate-tag, validate-prerelease]
    uses: ./.github/workflows/_static-checks.yml
    secrets: inherit

  unit-tests:
    name: Unit Tests
    needs: [validate-tag, validate-prerelease]
    uses: ./.github/workflows/_unit-tests.yml

  build-and-release:
    name: Build and Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [security, static-checks, unit-tests]
    # Required for Azure Artifact Signing OIDC (federated credential subject). Use an
    # Environment **without** required reviewers, or each matrix leg will wait on its
    # own deployment approval (see stacklok/infra Azure signing Terraform defaults).
    environment: artifact-signing
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-15-intel
            arch: x64
          - os: macos-latest
            arch: arm64
    env:
      NODE_OPTIONS: '--max_old_space_size=4096'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Update version from tag
        shell: bash
        run: |
          # Extract version from tag (remove 'v' prefix if present)
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION#v}
          echo "Setting version to: $VERSION"

          # Update package.json version
          npm version $VERSION --no-git-tag-version --allow-same-version 
          echo "Updated package.json version to $VERSION"

          # Set SENTRY_RELEASE for build and publish step
          echo "SENTRY_RELEASE=${VERSION}" >> $GITHUB_ENV

      - name: Setup macOS code signing
        uses: ./.github/actions/setup-macos-codesign
        if: runner.os == 'macOS'
        with:
          apple-certificate: ${{ secrets.APPLE_CERTIFICATE }}
          apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          apple-api-key: ${{ secrets.APPLE_API_KEY }}

          apple-issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
          apple-key-id: ${{ secrets.APPLE_KEY_ID }}

      - name: Setup Windows code signing
        uses: ./.github/actions/setup-windows-codesign
        if: runner.os == 'Windows'
        with:
          sm-host: ${{ secrets.SM_HOST }}
          sm-api-key: ${{ secrets.SM_API_KEY }}
          sm-client-cert-file-b64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
          sm-client-cert-password: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
          sm-code-signing-cert-sha1-hash: ${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }}

      - name: Setup Flatpak (Linux only)
        uses: ./.github/actions/setup-flatpak
        if: runner.os == 'Linux'

      - name: Configure AWS Credentials
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Publish: default is a single `electron-forge publish`. When Windows + full Azure Artifact
      # Signing vars are set, use `publish --dry-run` → Azure sign local artifacts →
      # `publish --from-dry-run` so GitHub/S3 uploads include the Azure signature (Forge
      # resumes by artifact path and re-reads files from disk).
      - name: Build and Publish
        if: >-
          runner.os != 'Windows' ||
          vars.AZURE_ARTIFACT_SIGNING_CLIENT_ID == '' ||
          vars.AZURE_ARTIFACT_SIGNING_TENANT_ID == '' ||
          vars.AZURE_ARTIFACT_SIGNING_SUBSCRIPTION_ID == '' ||
          vars.AZURE_ARTIFACT_SIGNING_ENDPOINT == '' ||
          vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME == '' ||
          vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME == ''
        run: pnpm run publish
        env:
          # Ensure the correct Node.js version is used for native modules
          npm_config_target_platform: ${{ runner.os == 'Linux' && 'linux' || (runner.os == 'macOS' && 'darwin' || 'win32') }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_THV_DSN: ${{ vars.VITE_SENTRY_THV_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ env.SENTRY_RELEASE }}
          # Apple API Key method for notarization (set by composite action)
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_ISSUER_ID: ${{ env.APPLE_ISSUER_ID }}
          APPLE_KEY_ID: ${{ env.APPLE_KEY_ID }}

      - name: Build release (publish dry-run, Windows / Azure Artifact Signing)
        if: >-
          runner.os == 'Windows' &&
          vars.AZURE_ARTIFACT_SIGNING_CLIENT_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_TENANT_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_SUBSCRIPTION_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' &&
          vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME != '' &&
          vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME != ''
        run: pnpm exec electron-forge publish --dry-run
        env:
          npm_config_target_platform: win32
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_THV_DSN: ${{ vars.VITE_SENTRY_THV_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ env.SENTRY_RELEASE }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_ISSUER_ID: ${{ env.APPLE_ISSUER_ID }}
          APPLE_KEY_ID: ${{ env.APPLE_KEY_ID }}

      # Optional Azure Artifact Signing (OIDC via user-assigned MI). Configure repo Variables
      # from stacklok/infra terraform outputs (see infra PR / issue #4395).
      # All AZURE_ARTIFACT_SIGNING_* vars below must be set together; partial config is skipped.
      - name: Azure login (Artifact Signing OIDC)
        if: >-
          runner.os == 'Windows' &&
          vars.AZURE_ARTIFACT_SIGNING_CLIENT_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_TENANT_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_SUBSCRIPTION_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' &&
          vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME != '' &&
          vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME != ''
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_ARTIFACT_SIGNING_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_ARTIFACT_SIGNING_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_ARTIFACT_SIGNING_SUBSCRIPTION_ID }}

      - name: Sign Windows release artifacts with Azure Artifact Signing
        if: >-
          runner.os == 'Windows' &&
          vars.AZURE_ARTIFACT_SIGNING_CLIENT_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_TENANT_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_SUBSCRIPTION_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' &&
          vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME != '' &&
          vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME != ''
        uses: azure/artifact-signing-action@48da903ca5e2d362da62c631a42d77c02ec7eadb # v1.2.0
        with:
          azure-tenant-id: ${{ vars.AZURE_ARTIFACT_SIGNING_TENANT_ID }}
          azure-client-id: ${{ vars.AZURE_ARTIFACT_SIGNING_CLIENT_ID }}
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\out\make
          files-folder-filter: exe,dll
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: 'http://timestamp.acs.microsoft.com'
          timestamp-digest: SHA256
          append-signature: true
          exclude-environment-credential: false
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-interactive-browser-credential: true

      - name: Publish release (from dry-run, Windows / Azure Artifact Signing)
        if: >-
          runner.os == 'Windows' &&
          vars.AZURE_ARTIFACT_SIGNING_CLIENT_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_TENANT_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_SUBSCRIPTION_ID != '' &&
          vars.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' &&
          vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME != '' &&
          vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME != ''
        run: pnpm exec electron-forge publish --from-dry-run
        env:
          npm_config_target_platform: win32
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_THV_DSN: ${{ vars.VITE_SENTRY_THV_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ env.SENTRY_RELEASE }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_ISSUER_ID: ${{ env.APPLE_ISSUER_ID }}
          APPLE_KEY_ID: ${{ env.APPLE_KEY_ID }}

      - name: Copy macOS update manifest to stable path
        id: macos-manifest
        if: runner.os == 'macOS' && vars.AWS_ROLE_ARN != ''
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION#v}
          CHANNEL=${{ github.event.release.prerelease == true && 'pre-release' || 'stable' }}
          ARCH=${{ matrix.arch }}
          BUCKET="toolhive-studio-releases"
          SRC="s3://${BUCKET}/${CHANNEL}/${VERSION}/darwin/${ARCH}/RELEASES.json"
          DST="s3://${BUCKET}/${CHANNEL}/latest/darwin/${ARCH}/RELEASES.json"

          if aws s3 cp "${SRC}" "${DST}"; then
            echo "uploaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No RELEASES.json found at ${SRC} — skipping"
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Promote Windows update manifests to stable path
        id: windows-manifest
        if: runner.os == 'Windows' && vars.AWS_ROLE_ARN != ''
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION#v}
          CHANNEL=${{ github.event.release.prerelease == true && 'pre-release' || 'stable' }}
          ARCH=${{ matrix.arch }}
          BUCKET="toolhive-studio-releases"
          SRC="s3://${BUCKET}/${CHANNEL}/${VERSION}/win32/${ARCH}"
          DST="s3://${BUCKET}/${CHANNEL}/latest/win32/${ARCH}"

          echo "Promoting Windows update files from ${SRC} to ${DST}"

          # --delete ensures stale nupkg files from previous releases don't accumulate in latest/
          # --copy-props none avoids s3:GetObjectTagging calls that the IAM role lacks
          if aws s3 sync "${SRC}/" "${DST}/" \
            --delete \
            --copy-props none \
            --exclude "*" \
            --include "RELEASES" \
            --include "*.nupkg"; then
            echo "uploaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No Windows update files found — skipping"
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Invalidate CloudFront cache for update manifests
        if: |
          vars.AWS_ROLE_ARN != '' &&
          vars.CLOUDFRONT_DISTRIBUTION_ID != '' &&
          (steps.macos-manifest.outputs.uploaded == 'true' || steps.windows-manifest.outputs.uploaded == 'true')
        shell: bash
        run: |
          CHANNEL=${{ github.event.release.prerelease == true && 'pre-release' || 'stable' }}
          PLATFORM=${{ runner.os == 'macOS' && 'darwin' || 'win32' }}
          ARCH=${{ matrix.arch }}
          DIST_ID="${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"

          echo "Invalidating /${CHANNEL}/latest/${PLATFORM}/${ARCH}/*"
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/${CHANNEL}/latest/${PLATFORM}/${ARCH}/*"

  mirror-pages:
    name: Mirror release to GitHub Pages
    needs: [build-and-release]
    if: ${{ always() && needs.build-and-release.result == 'success' }}
    uses: ./.github/workflows/mirror-to-gh-pages.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
